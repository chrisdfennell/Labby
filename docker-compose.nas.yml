# Compose file for running the stack ON the QNAP itself (Container Station).
# Uses prebuilt images (the NAS doesn't build): on your PC run
#   docker compose build
#   docker save labby-labby labby-kontainr-proxy -o labby-images.tar
# copy the tar to a NAS share, then on the NAS (SSH):
#   docker load -i /share/<YourShare>/labby-images.tar
#   docker compose -f docker-compose.nas.yml up -d
services:
  labby:
    image: labby-labby:latest
    container_name: labby
    ports:
      - "5123:8080"
    restart: unless-stopped
    depends_on:
      - kontainr
    environment:
      # Containers default to UTC; set TZ so weather timestamps and the clock read local time.
      TZ: ${TZ:-}
      # Setting a password turns on Labby's login screen.
      Auth__Username: ${LABBY_AUTH_USERNAME:-labby}
      Auth__Password: ${LABBY_AUTH_PASSWORD:-}
      # Webhook (ntfy topic URL, Discord, or Slack) for service down/recovery alerts.
      Alerts__WebhookUrl: ${LABBY_ALERT_WEBHOOK:-}
      # Pushover push notifications (set both to enable; works alongside the webhook).
      Alerts__PushoverToken: ${LABBY_PUSHOVER_TOKEN:-}
      Alerts__PushoverUser: ${LABBY_PUSHOVER_USER:-}
      # Local hour (0-23) for the good-morning digest; empty disables.
      Alerts__DigestHour: ${LABBY_DIGEST_HOUR:--1}
      # Qnap__Host is the NAS's own LAN IP — containers can reach QTS through it.
      Qnap__Host: ${QNAP_HOST:-}
      Qnap__Port: ${QNAP_PORT:-8080}
      Qnap__UseHttps: ${QNAP_USE_HTTPS:-false}
      Qnap__Username: ${QNAP_USERNAME:-}
      Qnap__Password: ${QNAP_PASSWORD:-}
      AmbientWeather__ApiKey: ${AMBIENT_API_KEY:-}
      AmbientWeather__ApplicationKey: ${AMBIENT_APP_KEY:-}
      AmbientWeather__DeviceMac: ${AMBIENT_DEVICE_MAC:-}
      # Loaded by the browser: use the NAS LAN IP, e.g. http://192.168.86.57:5124
      Kontainr__Url: ${KONTAINR_URL:-}
      # Web terminal embed (also browser-loaded); leave empty to hide the Terminal page.
      Terminal__Url: ${TERMINAL_URL:-}
      # OSINT Hub embed (also browser-loaded); leave empty to hide the OSINT page.
      Osint__Url: ${OSINT_URL:-}
      # Media page integrations — all optional.
      Media__Plex__Url: ${PLEX_BASE_URL:-}
      Media__Plex__ApiKey: ${PLEX_TOKEN:-}
      Media__Prowlarr__Url: ${PROWLARR_BASE_URL:-}
      Media__Prowlarr__ApiKey: ${PROWLARR_API_KEY:-}
      Media__Tautulli__Url: ${TAUTULLI_BASE_URL:-}
      Media__Tautulli__ApiKey: ${TAUTULLI_API_KEY:-}
      Media__Sonarr__Url: ${SONARR_BASE_URL:-}
      Media__Sonarr__ApiKey: ${SONARR_API_KEY:-}
      Media__Radarr__Url: ${RADARR_BASE_URL:-}
      Media__Radarr__ApiKey: ${RADARR_API_KEY:-}
      Media__Overseerr__Url: ${OVERSEERR_BASE_URL:-}
      Media__Overseerr__ApiKey: ${OVERSEERR_API_KEY:-}
      Media__Qbittorrent__Url: ${QBITTORRENT_BASE_URL:-}
      Media__Qbittorrent__Username: ${QBITTORRENT_USERNAME:-}
      Media__Qbittorrent__Password: ${QBITTORRENT_PASSWORD:-}
      Media__Nzbget__Url: ${NZBGET_BASE_URL:-}
      Media__Nzbget__Username: ${NZBGET_USERNAME:-}
      Media__Nzbget__Password: ${NZBGET_PASSWORD:-}
    volumes:
      # Weather history database survives container rebuilds.
      - labby-data:/app/data
      # Enables the container-logs viewer on the Containers page.
      - /var/run/docker.sock:/var/run/docker.sock

  kontainr:
    image: fennch/kontainr:latest
    container_name: kontainr
    restart: unless-stopped
    volumes:
      # The NAS's Docker socket — Kontainr manages Container Station's containers directly.
      - /var/run/docker.sock:/var/run/docker.sock
      - kontainr-data:/app/data
    environment:
      Auth__Username: ${KONTAINR_AUTH_USERNAME:-}
      Auth__Password: ${KONTAINR_AUTH_PASSWORD:-}

  kontainr-proxy:
    image: labby-kontainr-proxy:latest
    container_name: kontainr-proxy
    ports:
      - "5124:8080"
    restart: unless-stopped
    depends_on:
      - kontainr

volumes:
  labby-data:
  kontainr-data:
