services:
  labby:
    build: .
    container_name: labby
    ports:
      - "5123:8080"
    restart: unless-stopped
    depends_on:
      - kontainr
    environment:
      # Any appsettings.json value can be overridden here with __ as the separator.
      # Prefer putting secrets in a .env file next to this compose file (see .env.example).
      # Setting a password turns on Labby's login screen.
      Auth__Username: ${LABBY_AUTH_USERNAME:-labby}
      Auth__Password: ${LABBY_AUTH_PASSWORD:-}
      # Webhook (ntfy topic URL, Discord, or Slack) for service down/recovery alerts.
      Alerts__WebhookUrl: ${LABBY_ALERT_WEBHOOK:-}
      Qnap__Host: ${QNAP_HOST:-}
      Qnap__Port: ${QNAP_PORT:-8080}
      Qnap__UseHttps: ${QNAP_USE_HTTPS:-false}
      Qnap__Username: ${QNAP_USERNAME:-}
      Qnap__Password: ${QNAP_PASSWORD:-}
      AmbientWeather__ApiKey: ${AMBIENT_API_KEY:-}
      AmbientWeather__ApplicationKey: ${AMBIENT_APP_KEY:-}
      AmbientWeather__DeviceMac: ${AMBIENT_DEVICE_MAC:-}
      # Must be reachable from the BROWSER (it's an iframe src), not from inside the labby container.
      Kontainr__Url: ${KONTAINR_URL:-http://localhost:5124}
      # Media page integrations — all optional.
      Media__Tautulli__Url: ${TAUTULLI_BASE_URL:-}
      Media__Tautulli__ApiKey: ${TAUTULLI_API_KEY:-}
      Media__Sonarr__Url: ${SONARR_BASE_URL:-}
      Media__Sonarr__ApiKey: ${SONARR_API_KEY:-}
      Media__Radarr__Url: ${RADARR_BASE_URL:-}
      Media__Radarr__ApiKey: ${RADARR_API_KEY:-}
      Media__Overseerr__Url: ${OVERSEERR_BASE_URL:-}
      Media__Overseerr__ApiKey: ${OVERSEERR_API_KEY:-}
      Media__Qbittorrent__Url: ${QBITTORRENT_BASE_URL:-}
      Media__Qbittorrent__Username: ${QBITTORRENT_USERNAME:-}
      Media__Qbittorrent__Password: ${QBITTORRENT_PASSWORD:-}
      Media__Nzbget__Url: ${NZBGET_BASE_URL:-}
      Media__Nzbget__Username: ${NZBGET_USERNAME:-}
      Media__Nzbget__Password: ${NZBGET_PASSWORD:-}
    volumes:
      # Weather history database survives container rebuilds.
      - labby-data:/app/data

  kontainr:
    image: fennch/kontainr:latest
    container_name: kontainr
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - kontainr-data:/app/data
    environment:
      # Optional basic auth for Kontainr itself:
      Auth__Username: ${KONTAINR_AUTH_USERNAME:-}
      Auth__Password: ${KONTAINR_AUTH_PASSWORD:-}

  # Kontainr sends X-Frame-Options/CSP headers that block embedding; this proxy
  # strips them so Labby's Containers page can iframe it.
  kontainr-proxy:
    build:
      context: ./deploy
      dockerfile: Dockerfile.kontainr-proxy
    container_name: kontainr-proxy
    ports:
      - "5124:8080"
    restart: unless-stopped
    depends_on:
      - kontainr

volumes:
  labby-data:
  kontainr-data:
